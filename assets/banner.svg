<svg width="100%" viewBox="0 0 860 180" xmlns="http://www.w3.org/2000/svg" role="img">
  <title>The Optimal Stopping — Secretary Problem</title>
  <desc>Animated banner showing candidates being evaluated and the optimal stopping threshold</desc>

  <defs>
    <style>
      .title { font-family: 'Segoe UI', 'Liberation Sans', Arial, sans-serif; font-size: 28px; font-weight: 700; fill: #1a1a2e; letter-spacing: -0.5px; }
      .sub   { font-family: 'Segoe UI', 'Liberation Sans', Arial, sans-serif; font-size: 13px; font-weight: 400; fill: #4a4a6a; }
      .badge { font-family: 'Segoe UI Mono', 'Liberation Mono', monospace; font-size: 11px; font-weight: 600; }
      .tag   { font-family: 'Segoe UI', 'Liberation Sans', Arial, sans-serif; font-size: 10px; font-weight: 500; }

      /* candidate dots */
      @keyframes appear { from { opacity:0; transform: scale(0.3); } to { opacity:1; transform: scale(1); } }
      @keyframes pulse  { 0%,100%{ r:9; } 50%{ r:11; } }
      @keyframes reject { 0%{ opacity:1; } 60%{ opacity:0.15; } 100%{ opacity:0.15; } }
      @keyframes accept { 0%{ fill:#7b61ff; } 100%{ fill:#00c875; } }
      @keyframes starappear { 0%{ opacity:0; transform:scale(0) rotate(-30deg); } 70%{ transform:scale(1.3) rotate(5deg); } 100%{ opacity:1; transform:scale(1) rotate(0deg); } }
      @keyframes sweep  { from { width:0; } to { width:100%; } }
      @keyframes threshold-pulse { 0%,100%{ stroke-opacity:0.6; } 50%{ stroke-opacity:1; } }
      @keyframes label-fade { from{opacity:0;} to{opacity:1;} }
      @keyframes prob-rise { from{ height:0; y:100; } to{} }

      /* curve drawing */
      @keyframes draw { from{ stroke-dashoffset: 400; } to{ stroke-dashoffset: 0; } }

      .c1 { animation: appear 0.3s 0.2s both ease-out; }
      .c2 { animation: appear 0.3s 0.5s both ease-out; }
      .c3 { animation: appear 0.3s 0.8s both ease-out; }
      .c4 { animation: appear 0.3s 1.1s both ease-out; }
      .c5 { animation: appear 0.3s 1.4s both ease-out, reject 0.5s 1.6s both; }
      .c6 { animation: appear 0.3s 1.7s both ease-out, reject 0.5s 1.9s both; }
      .c7 { animation: appear 0.3s 2.0s both ease-out, reject 0.5s 2.2s both; }
      .c-best { animation: appear 0.3s 2.3s both ease-out, pulse 1s 2.5s ease-in-out infinite; fill: #00c875; }
      .x1 { animation: appear 0.2s 1.7s both; opacity: 0.4; }
      .x2 { animation: appear 0.2s 2.0s both; opacity: 0.4; }
      .x3 { animation: appear 0.2s 2.3s both; opacity: 0.4; }
      .star { animation: starappear 0.5s 2.6s both ease-out; transform-origin: 610px 72px; }
      .thresh-line { animation: threshold-pulse 2s 1.5s ease-in-out infinite; }
      .thresh-label { animation: label-fade 0.5s 1.5s both; }
      .curve { stroke-dasharray: 400; animation: draw 1.5s 0.5s both ease-out; }
      .eq-label { animation: label-fade 0.8s 2.0s both; }
    </style>

    <!-- background gradient -->
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%"   stop-color="#f0eeff"/>
      <stop offset="55%"  stop-color="#e8f4ff"/>
      <stop offset="100%" stop-color="#eafff4"/>
    </linearGradient>

    <!-- glow for best candidate -->
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%"  stop-color="#00c875" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#00c875" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- background -->
  <rect width="860" height="180" rx="14" fill="url(#bg)"/>
  <rect width="860" height="180" rx="14" fill="none" stroke="#c8bfff" stroke-width="1.5"/>

  <!-- === LEFT PANEL: title + subtitle === -->
  <text class="title" x="36" y="58">Optimal Stopping</text>
  <text class="sub"   x="36" y="80">Secretary Problem · Monte Carlo Simulation</text>

  <!-- badges -->
  <rect x="36"  y="93" width="54" height="18" rx="5" fill="#ede9ff"/>
  <text class="badge" x="63"  y="105" text-anchor="middle" fill="#5b3fd4">Python</text>

  <rect x="96"  y="93" width="68" height="18" rx="5" fill="#e0f7ef"/>
  <text class="badge" x="130" y="105" text-anchor="middle" fill="#0a7c50">matplotlib</text>

  <rect x="170" y="93" width="74" height="18" rx="5" fill="#fff3e0"/>
  <text class="badge" x="207" y="105" text-anchor="middle" fill="#a05a00">In Progress</text>

  <!-- key stat -->
  <text class="sub" x="36" y="136">Optimal threshold</text>
  <text style="font-family:'Segoe UI Mono',monospace; font-size:15px; font-weight:700; fill:#5b3fd4;" x="36" y="158">r* = n / e ≈ 36.8%</text>

  <!-- divider -->
  <line x1="295" y1="18" x2="295" y2="162" stroke="#c8bfff" stroke-width="1" stroke-dasharray="4 3"/>

  <!-- === MIDDLE PANEL: candidate animation === -->
  <text class="sub" x="315" y="30" font-size="11">Candidates evaluated one-by-one</text>

  <!-- observe zone label -->
  <text class="tag thresh-label" x="360" y="48" fill="#9b8fd4" text-anchor="middle">← observe (skip) →</text>

  <!-- threshold vertical line -->
  <line class="thresh-line" x1="415" y1="54" x2="415" y2="140" stroke="#7b61ff" stroke-width="1.5" stroke-dasharray="5 3"/>
  <text class="tag thresh-label" x="415" y="50" text-anchor="middle" fill="#7b61ff" font-size="10">n/e</text>

  <!-- candidate circles: observe phase (dimmed after seen) -->
  <!-- rank indicators (tiny bar above each) -->
  <rect x="317" y="62" width="8" height="20" rx="2" fill="#7b61ff" opacity="0.25" class="c1"/>
  <rect x="347" y="55" width="8" height="27" rx="2" fill="#7b61ff" opacity="0.25" class="c2"/>
  <rect x="377" y="68" width="8" height="14" rx="2" fill="#7b61ff" opacity="0.25" class="c3"/>

  <!-- observe dots -->
  <circle class="c1" cx="321" cy="95" r="9" fill="#7b61ff" opacity="0.45"/>
  <circle class="c2" cx="351" cy="95" r="9" fill="#7b61ff" opacity="0.45"/>
  <circle class="c3" cx="381" cy="95" r="9" fill="#7b61ff" opacity="0.45"/>

  <!-- "hire if better" zone -->
  <!-- rank bars -->
  <rect x="427" y="72" width="8" height="10" rx="2" fill="#7b61ff" opacity="0.25" class="c4"/>
  <rect x="457" y="64" width="8" height="18" rx="2" fill="#7b61ff" opacity="0.25" class="c5"/>
  <rect x="487" y="60" width="8" height="22" rx="2" fill="#7b61ff" opacity="0.25" class="c6"/>
  <rect x="517" y="58" width="8" height="24" rx="2" fill="#7b61ff" opacity="0.25" class="c7"/>

  <!-- hire-zone dots with reject marks -->
  <circle class="c4" cx="431" cy="95" r="9" fill="#7b61ff" opacity="0.5"/>
  <circle class="c5" cx="461" cy="95" r="9" fill="#c084fc"/>
  <text class="x1" x="461" y="99" text-anchor="middle" fill="#fff" font-size="12" font-weight="700">✕</text>

  <circle class="c6" cx="491" cy="95" r="9" fill="#c084fc"/>
  <text class="x2" x="491" y="99" text-anchor="middle" fill="#fff" font-size="12" font-weight="700">✕</text>

  <circle class="c7" cx="521" cy="95" r="9" fill="#c084fc"/>
  <text class="x3" x="521" y="99" text-anchor="middle" fill="#fff" font-size="12" font-weight="700">✕</text>

  <!-- best candidate found -->
  <rect x="587" y="52" width="8" height="30" rx="2" fill="#00c875" opacity="0.4" class="c-best"/>
  <ellipse class="star" cx="610" cy="52" rx="22" ry="22" fill="url(#glow)"/>
  <circle class="c-best" cx="591" cy="95" r="9"/>
  <!-- star icon -->
  <text class="star" x="591" y="99" text-anchor="middle" fill="#fff" font-size="12">★</text>
  <text class="tag thresh-label" x="591" y="122" fill="#00a860" text-anchor="middle" font-size="10">HIRE!</text>

  <!-- legend line -->
  <line x1="315" y1="140" x2="620" y2="140" stroke="#c8bfff" stroke-width="0.8"/>
  <text class="tag" x="315" y="155" fill="#9b8fd4" font-size="9">skip best seen</text>
  <text class="tag" x="420" y="155" fill="#9b8fd4" font-size="9">hire first better-than-all</text>

  <!-- divider 2 -->
  <line x1="638" y1="18" x2="638" y2="162" stroke="#c8bfff" stroke-width="1" stroke-dasharray="4 3"/>

  <!-- === RIGHT PANEL: probability curve === -->
  <text class="sub" x="654" y="30" font-size="11">Success probability</text>

  <!-- axes -->
  <line x1="658" y1="36" x2="658" y2="135" stroke="#c8bfff" stroke-width="1"/>
  <line x1="658" y1="135" x2="838" y2="135" stroke="#c8bfff" stroke-width="1"/>

  <!-- curve: empirical bell peaking near n/e -->
  <polyline class="curve" fill="none" stroke="#7b61ff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"
    points="
      659,133 665,125 672,113 680,100 689,88 698,78 707,72 716,68 724,65
      732,64 740,65 748,69 756,75 764,82 772,90 780,100 788,110 796,120 804,128 812,133 830,135
    "/>

  <!-- peak marker -->
  <line x1="732" y1="64" x2="732" y2="135" stroke="#00c875" stroke-width="1" stroke-dasharray="3 2" class="eq-label"/>
  <circle cx="732" cy="64" r="3" fill="#00c875" class="eq-label"/>
  <text class="tag eq-label" x="733" y="60" fill="#00a860" font-size="9">≈ 36.8%</text>

  <!-- axis labels -->
  <text class="tag" x="748" y="148" fill="#9b8fd4" font-size="9" text-anchor="middle">threshold r →</text>
  <text class="tag eq-label" x="740" y="135" fill="#7b61ff" font-size="8" text-anchor="middle">n/e</text>

  <!-- P label -->
  <text class="tag" x="649" y="86" fill="#9b8fd4" font-size="9" text-anchor="middle">P</text>
</svg>
