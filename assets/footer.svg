<svg width="100%" viewBox="0 0 860 64" xmlns="http://www.w3.org/2000/svg" role="img">
  <title>Footer — Optimal Stopping / Secretary Problem</title>
  <desc>Animated footer banner with probability convergence text</desc>

  <defs>
    <style>
      .ft { font-family: 'Segoe UI', 'Liberation Sans', Arial, sans-serif; }
      @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.2} }
      @keyframes slide-in { from{opacity:0; transform:translateX(-8px);} to{opacity:1; transform:translateX(0);} }
      @keyframes draw { from{ stroke-dashoffset:300; } to{ stroke-dashoffset:0; } }
      .line1 { animation: slide-in 0.5s 0.1s both; }
      .line2 { animation: slide-in 0.5s 0.4s both; }
      .line3 { animation: slide-in 0.5s 0.7s both; }
      .cursor { animation: blink 1.1s 1s step-end infinite; }
      .wave { stroke-dasharray:300; animation: draw 1.8s 0.3s both ease-out; }
    </style>
    <linearGradient id="fbg" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%"   stop-color="#1a1a2e"/>
      <stop offset="60%"  stop-color="#16213e"/>
      <stop offset="100%" stop-color="#0f3460"/>
    </linearGradient>
  </defs>

  <rect width="860" height="64" rx="12" fill="url(#fbg)"/>
  <rect width="860" height="64" rx="12" fill="none" stroke="#7b61ff" stroke-width="1" stroke-opacity="0.4"/>

  <!-- terminal-style left block -->
  <text class="ft line1" x="22" y="22" font-size="10" fill="#7b61ff" opacity="0.7">$</text>
  <text class="ft line1" x="32" y="22" font-size="10" fill="#a78bfa">python convergence_verification.py</text>

  <text class="ft line2" x="22" y="38" font-size="10" fill="#4ade80">→</text>
  <text class="ft line2" x="34" y="38" font-size="10" fill="#86efac">Best r converges to n/e as n → ∞</text>

  <text class="ft line3" x="22" y="54" font-size="10" fill="#4ade80">→</text>
  <text class="ft line3" x="34" y="54" font-size="10" fill="#86efac">P(success) → 1/e ≈ 0.3679</text>
  <rect class="cursor" x="155" y="45" width="6" height="11" rx="1" fill="#86efac"/>

  <!-- divider -->
  <line x1="340" y1="10" x2="340" y2="54" stroke="#7b61ff" stroke-width="0.5" stroke-opacity="0.4"/>

  <!-- right: mini convergence wave -->
  <text class="ft" x="360" y="18" font-size="9" fill="#a78bfa" opacity="0.8">P(n) convergence to 1/e</text>
  <!-- axes -->
  <line x1="365" y1="24" x2="365" y2="56" stroke="#ffffff" stroke-width="0.5" stroke-opacity="0.2"/>
  <line x1="365" y1="56" x2="830" y2="56" stroke="#ffffff" stroke-width="0.5" stroke-opacity="0.2"/>
  <!-- asymptote line -->
  <line x1="365" y1="38" x2="830" y2="38" stroke="#4ade80" stroke-width="0.6" stroke-dasharray="4 3" stroke-opacity="0.5"/>
  <text class="ft" x="832" y="41" font-size="8" fill="#4ade80" opacity="0.7">1/e</text>
  <!-- convergence curve -->
  <polyline class="wave" fill="none" stroke="#a78bfa" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"
    points="365,53 385,46 405,41 425,39.5 448,38.8 475,38.5 510,38.3 550,38.2 600,38.1 660,38.05 740,38.02 820,38.01"/>
  <!-- dots at sample n values -->
  <circle cx="385" cy="46"    r="2.5" fill="#c084fc"/>
  <circle cx="425" cy="39.5"  r="2.5" fill="#c084fc"/>
  <circle cx="510" cy="38.3"  r="2.5" fill="#c084fc"/>
  <circle cx="660" cy="38.05" r="2.5" fill="#c084fc"/>
  <!-- n labels -->
  <text class="ft" x="385" y="57" font-size="7" fill="#c084fc" text-anchor="middle">10</text>
  <text class="ft" x="425" y="57" font-size="7" fill="#c084fc" text-anchor="middle">50</text>
  <text class="ft" x="510" y="57" font-size="7" fill="#c084fc" text-anchor="middle">100</text>
  <text class="ft" x="660" y="57" font-size="7" fill="#c084fc" text-anchor="middle">1000</text>
  <!-- x-axis label -->
  <text class="ft" x="600" y="64" font-size="7" fill="#7b61ff" opacity="0.6" text-anchor="middle">n →</text>
</svg>
